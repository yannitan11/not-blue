name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # First attempt — the Pages API occasionally returns a transient
      # "Deployment failed, try again later." right after a build.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      # Retry once if the transient hit, so `git push` deploys are one-shot.
      - if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
